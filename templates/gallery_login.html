
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Private Gallery</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(
        135deg,
        #ffdde1,
        #ee9ca7,
        #fad0c4
    );
}

/* Login Card */

.card{
    width:100%;
    max-width:420px;

    background:white;
    border-radius:25px;

    padding:40px 30px;

    text-align:center;

    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.icon{
    font-size:60px;
    margin-bottom:15px;
}

h1{
    margin-bottom:10px;
    color:#333;
}

.subtitle{
    color:#777;
    margin-bottom:30px;
    line-height:1.5;
}

input{
    width:100%;
    padding:14px;

    border:1px solid #ddd;
    border-radius:12px;

    font-size:16px;

    margin-bottom:20px;
}

button{
    width:100%;

    border:none;

    background:#6c63ff;
    color:white;

    padding:14px;

    border-radius:12px;

    font-size:16px;
    font-weight:600;

    cursor:pointer;

    transition:.3s;
}

button:hover{
    background:#5b53e6;
}

.error{
    margin-top:15px;
    color:red;
    font-weight:500;
}

.footer{
    margin-top:20px;
    color:#999;
    font-size:14px;
}

@media(max-width:600px){

    .card{
        padding:30px 20px;
    }

    h1{
        font-size:1.8rem;
    }

    .icon{
        font-size:50px;
    }
}

</style>
</head>

<body>

<div class="card">

    <div class="icon">
        🔒
    </div>

    <h1>Private Gallery</h1>

    <p class="subtitle">
        This gallery is protected.<br>
        Enter the password to view all wedding memories.
    </p>

    <form method="POST">

        {% csrf_token %}

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>

        <button type="submit">
            ❤️ Open Gallery
        </button>

    </form>

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    <div class="footer">
        💍 Rahul ❤️ Priya Wedding Memories
    </div>

</div>

</body>
</html>
